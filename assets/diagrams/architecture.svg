<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="620" fill="url(#bg)"/>
  <text x="450" y="36" fill="#e2e8f0" font-size="22" font-weight="700" text-anchor="middle">DownloadBuddy — System Architecture</text>
  <text x="450" y="58" fill="#94a3b8" font-size="13" text-anchor="middle">WhatsApp ⇄ Baileys ⇄ Node.js (Express + Commands) ⇄ SQLite ⇄ External APIs</text>

  <!-- WhatsApp user -->
  <g filter="url(#g)">
    <rect x="40" y="100" width="150" height="70" rx="12" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="115" y="130" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">📱 WhatsApp User</text>
    <text x="115" y="152" fill="#94a3b8" font-size="11" text-anchor="middle">DM / Group chat</text>
  </g>

  <!-- Baileys layer -->
  <g filter="url(#g)">
    <rect x="240" y="100" width="170" height="70" rx="12" fill="url(#box)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="325" y="130" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">🔌 Baileys Socket</text>
    <text x="325" y="152" fill="#94a3b8" font-size="11" text-anchor="middle">Multi-device protocol</text>
  </g>

  <!-- Event Router -->
  <g filter="url(#g)">
    <rect x="460" y="100" width="170" height="70" rx="12" fill="url(#box)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="545" y="130" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">🔀 Event Router</text>
    <text x="545" y="152" fill="#94a3b8" font-size="11" text-anchor="middle">getEvents.js</text>
  </g>

  <!-- Dispatcher -->
  <g filter="url(#g)">
    <rect x="680" y="100" width="170" height="70" rx="12" fill="url(#box)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="765" y="130" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">📨 Command Dispatcher</text>
    <text x="765" y="152" fill="#94a3b8" font-size="11" text-anchor="middle">getMessagesEvent.js</text>
  </g>

  <!-- Arrows top row -->
  <path d="M190,135 L240,135" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M410,135 L460,135" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M630,135 L680,135" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Commands columns -->
  <g filter="url(#g)">
    <rect x="40" y="240" width="200" height="60" rx="10" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="140" y="268" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">🌐 Public Commands</text>
    <text x="140" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">Anyone · DM or Group</text>
  </g>
  <g filter="url(#g)">
    <rect x="260" y="240" width="200" height="60" rx="10" fill="url(#box)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="360" y="268" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">👥 Member Commands</text>
    <text x="360" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">Group members only</text>
  </g>
  <g filter="url(#g)">
    <rect x="480" y="240" width="200" height="60" rx="10" fill="url(#box)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="580" y="268" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">🛡️ Admin Commands</text>
    <text x="580" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">Group admins</text>
  </g>
  <g filter="url(#g)">
    <rect x="700" y="240" width="200" height="60" rx="10" fill="url(#box)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="800" y="268" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">👑 Owner Commands</text>
    <text x="800" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">MY_NUMBER only</text>
  </g>

  <!-- arrows from dispatcher to each -->
  <path d="M765,170 L140,240" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M765,170 L360,240" stroke="#06b6d4" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M765,170 L580,240" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M765,170 L800,240" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>

  <!-- Bottom: services -->
  <text x="450" y="345" fill="#94a3b8" font-size="12" text-anchor="middle">▼ Command handlers invoke these services ▼</text>

  <g filter="url(#g)">
    <rect x="40" y="365" width="160" height="60" rx="10" fill="url(#box)" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="120" y="393" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">🗄️ SQLite</text>
    <text x="120" y="412" fill="#94a3b8" font-size="10" text-anchor="middle">Auth + Groups + Members</text>
  </g>
  <g filter="url(#g)">
    <rect x="220" y="365" width="160" height="60" rx="10" fill="url(#box)" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="300" y="393" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">📥 yt-dlp / ytdl</text>
    <text x="300" y="412" fill="#94a3b8" font-size="10" text-anchor="middle">YouTube, FB, IG, X</text>
  </g>
  <g filter="url(#g)">
    <rect x="400" y="365" width="160" height="60" rx="10" fill="url(#box)" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="480" y="393" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">🤖 AI Providers</text>
    <text x="480" y="412" fill="#94a3b8" font-size="10" text-anchor="middle">Groq · Gemini · OpenAI</text>
  </g>
  <g filter="url(#g)">
    <rect x="580" y="365" width="160" height="60" rx="10" fill="url(#box)" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="660" y="393" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">🖼️ Media</text>
    <text x="660" y="412" fill="#94a3b8" font-size="10" text-anchor="middle">ffmpeg · sharp · canvas</text>
  </g>
  <g filter="url(#g)">
    <rect x="760" y="365" width="120" height="60" rx="10" fill="url(#box)" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="820" y="393" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">🌐 3rd-party APIs</text>
    <text x="820" y="412" fill="#94a3b8" font-size="10" text-anchor="middle">Weather, Genius, …</text>
  </g>

  <!-- Pulse dots on services (animated) -->
  <circle cx="120" cy="425" r="3" fill="#22c55e">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="425" r="3" fill="#22c55e">
    <animate attributeName="r" values="3;6;3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="425" r="3" fill="#22c55e">
    <animate attributeName="r" values="3;6;3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="425" r="3" fill="#22c55e">
    <animate attributeName="r" values="3;6;3" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="425" r="3" fill="#22c55e">
    <animate attributeName="r" values="3;6;3" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Dashboard / Express -->
  <g filter="url(#g)">
    <rect x="40" y="470" width="350" height="70" rx="12" fill="url(#box)" stroke="#ec4899" stroke-width="1.5"/>
    <text x="215" y="498" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">🎛️ React Admin Dashboard (/admin)</text>
    <text x="215" y="520" fill="#94a3b8" font-size="11" text-anchor="middle">Stats · Analytics · Groups · Members · Health · Send API</text>
  </g>
  <g filter="url(#g)">
    <rect x="430" y="470" width="200" height="70" rx="12" fill="url(#box)" stroke="#ec4899" stroke-width="1.5"/>
    <text x="530" y="498" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">🌐 Express Server</text>
    <text x="530" y="520" fill="#94a3b8" font-size="11" text-anchor="middle">REST API + WebSocket</text>
  </g>
  <g filter="url(#g)">
    <rect x="670" y="470" width="210" height="70" rx="12" fill="url(#box)" stroke="#ec4899" stroke-width="1.5"/>
    <text x="775" y="498" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">📊 Landing + QR page</text>
    <text x="775" y="520" fill="#94a3b8" font-size="11" text-anchor="middle">/ and /admin/login</text>
  </g>

  <path d="M325,365 L325,450 L215,450 L215,470" stroke="#ec4899" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M545,365 L545,450 L530,450 L530,470" stroke="#ec4899" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M765,365 L765,450 L775,450 L775,470" stroke="#ec4899" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>

  <text x="450" y="590" fill="#64748b" font-size="11" text-anchor="middle">Solid arrows = live message flow  ·  Dashed = internal handoff  ·  Pulsing dots = active integrations</text>
</svg>
