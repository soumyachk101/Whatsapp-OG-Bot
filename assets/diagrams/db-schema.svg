<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="url(#bg)"/>
  <text x="450" y="34" fill="#e2e8f0" font-size="20" font-weight="700" text-anchor="middle">🗄️ database.db — single-file SQLite schema</text>
  <text x="450" y="56" fill="#94a3b8" font-size="12" text-anchor="middle">All state lives in one file. WAL mode = safe reads while the bot writes.</text>

  <!-- AuthState -->
  <g>
    <rect x="30" y="100" width="260" height="200" rx="12" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="160" y="125" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">AuthState</text>
    <text x="160" y="145" fill="#64748b" font-size="10" text-anchor="middle">PK: id (TEXT)</text>
    <line x1="50" y1="155" x2="270" y2="155" stroke="#334155"/>
    <text x="50" y="180" fill="#94a3b8" font-size="11" font-family="monospace">• id    TEXT PK</text>
    <text x="50" y="200" fill="#94a3b8" font-size="11" font-family="monospace">• value TEXT</text>
    <text x="160" y="230" fill="#64748b" font-size="10" text-anchor="middle">—</text>
    <text x="160" y="250" fill="#94a3b8" font-size="10" text-anchor="middle">WhatsApp creds blob</text>
    <text x="160" y="266" fill="#94a3b8" font-size="10" text-anchor="middle">(noise-key, signed-identity,</text>
    <text x="160" y="282" fill="#94a3b8" font-size="10" text-anchor="middle"> pre-keys, app-state, …)</text>
  </g>

  <!-- AuthTable -->
  <g>
    <rect x="320" y="100" width="260" height="200" rx="12" fill="url(#box)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="450" y="125" fill="#06b6d4" font-size="14" font-weight="700" text-anchor="middle">AuthTable</text>
    <text x="450" y="145" fill="#64748b" font-size="10" text-anchor="middle">PK: id (TEXT)  ·  always "bot"</text>
    <line x1="340" y1="155" x2="560" y2="155" stroke="#334155"/>
    <text x="340" y="180" fill="#94a3b8" font-size="11" font-family="monospace">• id                TEXT PK</text>
    <text x="340" y="200" fill="#94a3b8" font-size="11" font-family="monospace">• youtube_session   TEXT</text>
    <text x="340" y="220" fill="#94a3b8" font-size="11" font-family="monospace">• disabledGlobally  TEXT (JSON)</text>
    <text x="450" y="250" fill="#64748b" font-size="10" text-anchor="middle">—</text>
    <text x="450" y="268" fill="#94a3b8" font-size="10" text-anchor="middle">Single-row bot-level settings:</text>
    <text x="450" y="284" fill="#94a3b8" font-size="10" text-anchor="middle">disabled commands, yt session</text>
  </g>

  <!-- Groups -->
  <g>
    <rect x="30" y="320" width="260" height="125" rx="12" fill="url(#box)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="160" y="345" fill="#a855f7" font-size="14" font-weight="700" text-anchor="middle">Groups</text>
    <text x="160" y="365" fill="#64748b" font-size="10" text-anchor="middle">PK: id (group JID)</text>
    <line x1="50" y1="375" x2="270" y2="375" stroke="#334155"/>
    <text x="50" y="395" fill="#94a3b8" font-size="11" font-family="monospace">• id   TEXT PK</text>
    <text x="50" y="415" fill="#94a3b8" font-size="11" font-family="monospace">• data TEXT (JSON)</text>
    <text x="160" y="435" fill="#64748b" font-size="10" text-anchor="middle">isBotOn, antilink, nsfw, …</text>
  </g>

  <!-- Members -->
  <g>
    <rect x="320" y="320" width="260" height="125" rx="12" fill="url(#box)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="450" y="345" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">Members</text>
    <text x="450" y="365" fill="#64748b" font-size="10" text-anchor="middle">PK: id (user JID or LID)</text>
    <line x1="340" y1="375" x2="560" y2="375" stroke="#334155"/>
    <text x="340" y="395" fill="#94a3b8" font-size="11" font-family="monospace">• id   TEXT PK</text>
    <text x="340" y="415" fill="#94a3b8" font-size="11" font-family="monospace">• data TEXT (JSON)</text>
    <text x="450" y="435" fill="#64748b" font-size="10" text-anchor="middle">xp, isBlock, warnings, totals</text>
  </g>

  <!-- The single file -->
  <g>
    <rect x="610" y="100" width="260" height="345" rx="14" fill="url(#box)" stroke="#ec4899" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="740" y="128" fill="#ec4899" font-size="14" font-weight="700" text-anchor="middle">database.db</text>
    <text x="740" y="148" fill="#64748b" font-size="10" text-anchor="middle">WAL mode · better-sqlite3</text>
    <line x1="630" y1="158" x2="850" y2="158" stroke="#334155"/>
    <text x="630" y="190" fill="#e2e8f0" font-size="11" font-weight="600">Why one file?</text>
    <text x="630" y="212" fill="#94a3b8" font-size="10">• Zero infra — no Mongo, no Redis</text>
    <text x="630" y="230" fill="#94a3b8" font-size="10">• Easy backup: just copy the file</text>
    <text x="630" y="248" fill="#94a3b8" font-size="10">• Survives restarts (auth, state)</text>
    <text x="630" y="266" fill="#94a3b8" font-size="10">• Open in any SQLite browser to</text>
    <text x="630" y="282" fill="#94a3b8" font-size="10">  inspect or edit manually</text>

    <text x="630" y="320" fill="#e2e8f0" font-size="11" font-weight="600">Backup command</text>
    <rect x="630" y="330" width="220" height="22" rx="5" fill="#0b1220" stroke="#475569"/>
    <text x="740" y="345" fill="#a7f3d0" font-size="10" font-family="monospace" text-anchor="middle">sqlite3 database.db ".backup db.bak"</text>

    <text x="630" y="380" fill="#e2e8f0" font-size="11" font-weight="600">DANGER</text>
    <text x="630" y="398" fill="#ef4444" font-size="10">Deleting this file unlinks the bot</text>
    <text x="630" y="414" fill="#ef4444" font-size="10">and wipes all groups/members data.</text>
    <text x="630" y="430" fill="#ef4444" font-size="10">Always back up first.</text>
  </g>

  <!-- arrows from tables into db -->
  <path d="M290,200 L610,200" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M580,200 L610,200" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M290,382 L610,300" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M580,382 L610,330" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
</svg>
