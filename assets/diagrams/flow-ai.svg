<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="url(#bg)"/>
  <text x="450" y="34" fill="#e2e8f0" font-size="20" font-weight="700" text-anchor="middle">🤖 AI request flow — when the user runs -chatbot</text>
  <text x="450" y="56" fill="#94a3b8" font-size="12" text-anchor="middle">Pluggable LLM providers · context-aware (group history in SQLite) · per-group opt-in</text>

  <!-- Step 1 -->
  <g>
    <rect x="30" y="100" width="130" height="70" rx="10" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="95" y="125" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">1️⃣</text>
    <text x="95" y="145" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">User: -chatbot …</text>
    <text x="95" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">in group or DM</text>
  </g>
  <!-- Step 2 -->
  <g>
    <rect x="190" y="100" width="140" height="70" rx="10" fill="url(#box)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="260" y="125" fill="#06b6d4" font-size="11" font-weight="700" text-anchor="middle">2️⃣</text>
    <text x="260" y="145" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Bot enabled?</text>
    <text x="260" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">isBotOn &amp;&amp; isChatBotOn</text>
  </g>
  <!-- Step 3 -->
  <g>
    <rect x="360" y="100" width="140" height="70" rx="10" fill="url(#box)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="430" y="125" fill="#a855f7" font-size="11" font-weight="700" text-anchor="middle">3️⃣</text>
    <text x="430" y="145" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Load context</text>
    <text x="430" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">last N msgs from DB</text>
  </g>
  <!-- Step 4 -->
  <g>
    <rect x="530" y="100" width="140" height="70" rx="10" fill="url(#box)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="600" y="125" fill="#f59e0b" font-size="11" font-weight="700" text-anchor="middle">4️⃣</text>
    <text x="600" y="145" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Provider select</text>
    <text x="600" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">Groq → Gemini → OpenAI</text>
  </g>
  <!-- Step 5 -->
  <g>
    <rect x="700" y="100" width="170" height="70" rx="10" fill="url(#box)" stroke="#ec4899" stroke-width="1.5"/>
    <text x="785" y="125" fill="#ec4899" font-size="11" font-weight="700" text-anchor="middle">5️⃣</text>
    <text x="785" y="145" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">LLM API call</text>
    <text x="785" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">prompt + context</text>
  </g>

  <!-- arrows -->
  <path d="M160,135 L190,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M330,135 L360,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" begin="0.25s" repeatCount="indefinite"/>
  </path>
  <path d="M500,135 L530,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </path>
  <path d="M670,135 L700,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" begin="0.75s" repeatCount="indefinite"/>
  </path>

  <!-- Provider fallback notes -->
  <g>
    <rect x="30" y="220" width="260" height="100" rx="10" fill="url(#box)" stroke="#0ea5e9" stroke-width="1.2"/>
    <text x="160" y="244" fill="#0ea5e9" font-size="12" font-weight="600" text-anchor="middle">Provider priority</text>
    <text x="50" y="270" fill="#94a3b8" font-size="11">1. <tspan font-weight="600" fill="#e2e8f0">Groq</tspan> — fastest, default, free</text>
    <text x="50" y="288" fill="#94a3b8" font-size="11">2. <tspan font-weight="600" fill="#e2e8f0">Gemini</tspan> — Google, image-capable</text>
    <text x="50" y="306" fill="#94a3b8" font-size="11">3. <tspan font-weight="600" fill="#e2e8f0">OpenAI</tspan> — paid, GPT-4 class</text>
  </g>
  <g>
    <rect x="320" y="220" width="260" height="100" rx="10" fill="url(#box)" stroke="#a855f7" stroke-width="1.2"/>
    <text x="450" y="244" fill="#a855f7" font-size="12" font-weight="600" text-anchor="middle">Fun modes (-aimodes)</text>
    <text x="340" y="270" fill="#94a3b8" font-size="11">• <tspan font-weight="600" fill="#e2e8f0">-roast &lt;name&gt;</tspan> — savage roast</text>
    <text x="340" y="288" fill="#94a3b8" font-size="11">• <tspan font-weight="600" fill="#e2e8f0">-shayari / -rap</tspan> — poetry</text>
    <text x="340" y="306" fill="#94a3b8" font-size="11">• <tspan font-weight="600" fill="#e2e8f0">-story / -recipe / -fortune</tspan></text>
  </g>
  <g>
    <rect x="610" y="220" width="260" height="100" rx="10" fill="url(#box)" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="740" y="244" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">Memory &amp; privacy</text>
    <text x="630" y="270" fill="#94a3b8" font-size="11">• History stored in <tspan font-family="monospace">Groups.data</tspan></text>
    <text x="630" y="288" fill="#94a3b8" font-size="11">• Clear with <tspan font-family="monospace">-clearhistory</tspan></text>
    <text x="630" y="306" fill="#94a3b8" font-size="11">• Owner can inspect via dashboard</text>
  </g>

  <!-- return arrow -->
  <path d="M785,170 L785,200 L450,200 L450,220" stroke="#22c55e" stroke-width="1.2" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4" opacity="0.6"/>

  <text x="450" y="355" fill="#64748b" font-size="11" text-anchor="middle">Reply goes back through Baileys → typing indicator → WhatsApp → user</text>
</svg>
