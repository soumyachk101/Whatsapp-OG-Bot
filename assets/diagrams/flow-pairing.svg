<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="url(#bg)"/>
  <text x="450" y="34" fill="#e2e8f0" font-size="20" font-weight="700" text-anchor="middle">🔐 First-Time Pairing Flow (no QR scan)</text>
  <text x="450" y="56" fill="#94a3b8" font-size="12" text-anchor="middle">A safe alternative to scanning QR codes — link with phone number only</text>

  <!-- Step 1 -->
  <g>
    <rect x="30" y="90" width="160" height="90" rx="12" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="110" y="118" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">STEP 1</text>
    <text x="110" y="142" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">▶ Run bot</text>
    <text x="110" y="162" fill="#94a3b8" font-size="11" text-anchor="middle">pnpm start</text>
  </g>
  <!-- Step 2 -->
  <g>
    <rect x="220" y="90" width="160" height="90" rx="12" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="300" y="118" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">STEP 2</text>
    <text x="300" y="142" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">🌐 Open browser</text>
    <text x="300" y="162" fill="#94a3b8" font-size="11" text-anchor="middle">http://localhost:8000</text>
  </g>
  <!-- Step 3 -->
  <g>
    <rect x="410" y="90" width="160" height="90" rx="12" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="490" y="118" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">STEP 3</text>
    <text x="490" y="142" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">📞 Enter phone</text>
    <text x="490" y="162" fill="#94a3b8" font-size="11" text-anchor="middle">+CCxxxxxxxxxx</text>
  </g>
  <!-- Step 4 -->
  <g>
    <rect x="600" y="90" width="160" height="90" rx="12" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="680" y="118" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">STEP 4</text>
    <text x="680" y="142" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">🔑 Get 8-char code</text>
    <text x="680" y="162" fill="#94a3b8" font-size="11" text-anchor="middle">e.g. AB12-CD34</text>
  </g>

  <!-- Animated arrows -->
  <path d="M190,135 L220,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M380,135 L410,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </path>
  <path d="M570,135 L600,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </path>

  <!-- Step 5 (phone) -->
  <g>
    <rect x="780" y="90" width="100" height="90" rx="12" fill="url(#box)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="830" y="118" fill="#06b6d4" font-size="11" font-weight="700" text-anchor="middle">STEP 5</text>
    <text x="830" y="142" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">📱 Phone</text>
    <text x="830" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">Enter code</text>
  </g>

  <!-- step 5 arrow -->
  <path d="M760,135 L780,135" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1.2s" begin="0.9s" repeatCount="indefinite"/>
  </path>

  <!-- Result box -->
  <g>
    <rect x="220" y="230" width="460" height="90" rx="14" fill="url(#box)" stroke="#a855f7" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="450" y="262" fill="#a855f7" font-size="12" font-weight="700" text-anchor="middle">✅  BOT CONNECTED</text>
    <text x="450" y="284" fill="#e2e8f0" font-size="13" text-anchor="middle">Session stored in <tspan font-family="monospace">database.db</tspan> · survives restarts</text>
    <text x="450" y="305" fill="#94a3b8" font-size="11" text-anchor="middle">No re-pairing needed on next start · Logout from /admin to re-pair</text>
  </g>

  <!-- arrows from steps down to result -->
  <path d="M110,180 L110,215 L450,215 L450,230" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4" opacity="0.7"/>
  <path d="M830,180 L830,215 L450,215" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4" opacity="0.7"/>

  <text x="450" y="358" fill="#64748b" font-size="11" text-anchor="middle">Tip: The same session is reused every restart — your bot stays linked automatically.</text>
</svg>
