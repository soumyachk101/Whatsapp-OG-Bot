<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
    <marker id="ardy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="url(#bg)"/>
  <text x="450" y="34" fill="#e2e8f0" font-size="20" font-weight="700" text-anchor="middle">💬 Message Lifecycle — From “hello” to bot reply</text>
  <text x="450" y="56" fill="#94a3b8" font-size="12" text-anchor="middle">What happens when a user sends <tspan font-family="monospace">-song shape of you</tspan></text>

  <!-- nodes -->
  <g>
    <rect x="30" y="90" width="130" height="60" rx="10" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="95" y="116" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">1️⃣ User sends</text>
    <text x="95" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">-song …</text>
  </g>
  <g>
    <rect x="190" y="90" width="140" height="60" rx="10" fill="url(#box)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="260" y="116" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">2️⃣ Baileys</text>
    <text x="260" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">WebSocket event</text>
  </g>
  <g>
    <rect x="360" y="90" width="160" height="60" rx="10" fill="url(#box)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="440" y="116" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">3️⃣ Event Router</text>
    <text x="440" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">getEvents.js</text>
  </g>
  <g>
    <rect x="550" y="90" width="170" height="60" rx="10" fill="url(#box)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="635" y="116" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">4️⃣ Permission gate</text>
    <text x="635" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">DM / Group / Admin</text>
  </g>
  <g>
    <rect x="750" y="90" width="120" height="60" rx="10" fill="url(#box)" stroke="#ec4899" stroke-width="1.5"/>
    <text x="810" y="116" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">5️⃣ Handler</text>
    <text x="810" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">commandsPublic/…</text>
  </g>

  <!-- arrows row 1 -->
  <path d="M160,120 L190,120" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M330,120 L360,120" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" begin="0.2s" repeatCount="indefinite"/>
  </path>
  <path d="M520,120 L550,120" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <path d="M720,120 L750,120" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)">
    <animate attributeName="stroke-dasharray" values="0 6;6 0" dur="1s" begin="0.6s" repeatCount="indefinite"/>
  </path>

  <!-- Decision diamond -->
  <g transform="translate(450,210)">
    <polygon points="0,-40 130,0 0,40 -130,0" fill="url(#box)" stroke="#f59e0b" stroke-width="1.5"/>
    <text y="-8" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Bot enabled in this</text>
    <text y="10" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">group? (isBotOn)</text>
  </g>
  <path d="M810,150 L810,170 L580,170 L580,210" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#ardy)" stroke-dasharray="4 4"/>

  <!-- side branches -->
  <g>
    <rect x="20" y="300" width="220" height="60" rx="10" fill="url(#box)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="130" y="324" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">❌ No  → silent (no reply)</text>
    <text x="130" y="344" fill="#94a3b8" font-size="10" text-anchor="middle">Group admin must enable with -bot on</text>
  </g>
  <g>
    <rect x="660" y="300" width="220" height="60" rx="10" fill="url(#box)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="770" y="324" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">✅ Yes → 6️⃣ Run handler</text>
    <text x="770" y="344" fill="#94a3b8" font-size="10" text-anchor="middle">yt-dlp → ffmpeg → sendMessage</text>
  </g>

  <path d="M450,250 L450,275 L130,275 L130,300" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M450,250 L450,275 L770,275 L770,300" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>

  <!-- reply line -->
  <g>
    <rect x="260" y="395" width="380" height="55" rx="10" fill="url(#box)" stroke="#06b6d4" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="450" y="420" fill="#06b6d4" font-size="12" font-weight="600" text-anchor="middle">↩️  Reply: song file + caption “🎵 Shape of You”</text>
    <text x="450" y="440" fill="#94a3b8" font-size="11" text-anchor="middle">Through Baileys → WhatsApp → user’s chat</text>
  </g>

  <path d="M770,360 L770,375 L450,375 L450,395" stroke="#06b6d4" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4"/>
  <path d="M130,360 L130,375 L260,395" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)" stroke-dasharray="4 4" opacity="0.3"/>
</svg>
